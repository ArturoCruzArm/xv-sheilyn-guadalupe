<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Selector de Fotos - XV Años Sheilyn Guadalupe</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/fontawesome.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/solid.min.css">
    <link rel="stylesheet" href="css/selector.css?v=2">
</head>
<body>
    <header class="header">
        <h1 class="main-title">Sheilyn Guadalupe</h1>
        <p class="subtitle">XV Años</p>
        <p class="instructions">Selecciona las fotos para impresión</p>
    </header>

    <div class="container">
        <!-- Control Panel -->
        <div class="control-panel">
            <div class="stats-row">
                <div class="stat-card impresion">
                    <span class="stat-icon">📸</span>
                    <div class="stat-info">
                        <h3>Impresión</h3>
                        <span class="stat-count" id="countImpresion">0/100</span>
                    </div>
                </div>
                <div class="stat-card invitacion">
                    <span class="stat-icon">💌</span>
                    <div class="stat-info">
                        <h3>Invitación</h3>
                        <span class="stat-count" id="countInvitacion">0</span>
                    </div>
                </div>
                <div class="stat-card descartada">
                    <span class="stat-icon">❌</span>
                    <div class="stat-info">
                        <h3>Descartadas</h3>
                        <span class="stat-count" id="countDescartada">0</span>
                    </div>
                </div>
                <div class="stat-card sin-clasificar">
                    <span class="stat-icon">⭕</span>
                    <div class="stat-info">
                        <h3>Sin Clasificar</h3>
                        <span class="stat-count" id="countSinClasificar">0</span>
                    </div>
                </div>
                <div class="stat-card ampliacion" style="border-color:#a855f7;">
                    <span class="stat-icon">🖼️</span>
                    <div class="stat-info">
                        <h3>Ampliación</h3>
                        <span class="stat-count" id="countAmpliacion">0</span>
                    </div>
                </div>
                <div class="stat-card" style="border-color:#f59e0b;">
                    <span class="stat-icon">📦</span>
                    <div class="stat-info">
                        <h3>Caja Fotos</h3>
                        <span class="stat-count" id="countCajaFotos">—</span>
                    </div>
                </div>
                <div class="stat-card" style="border-color:#06b6d4;">
                    <span class="stat-icon">💾</span>
                    <div class="stat-info">
                        <h3>Caja USB</h3>
                        <span class="stat-count" id="countCajaUsb">—</span>
                    </div>
                </div>
            </div>

            <!-- Aviso costo adicional (aparece si se superan las 100 fotos) -->
            <div id="extraCostDisplay" style="display:none; background:rgba(255,152,0,0.15); border:1.5px solid #ff9800; border-radius:10px; padding:10px 16px; margin:10px 0; text-align:center; color:#ff9800;">
                ⚠️ Fotos adicionales: <strong id="extraCostDetail"></strong> — Costo extra: <strong id="extraCostAmount"></strong>
            </div>

            <div class="action-buttons">
                <button class="btn btn-filter active" id="btnFilterAll" data-filter="all">Todas</button>
                <button class="btn btn-filter filter-impresion" id="btnFilterImpresion" data-filter="impresion">Impresión</button>
                <button class="btn btn-filter filter-invitacion" id="btnFilterInvitacion" data-filter="invitacion">Invitación</button>
                <button class="btn btn-filter filter-descartada" id="btnFilterDescartada" data-filter="descartada">Descartadas</button>
                <button class="btn btn-filter filter-sin-clasificar" id="btnFilterSinClasificar" data-filter="sin-clasificar">Sin Clasificar</button>
                <button class="btn btn-filter" id="btnFilterAmpliacion" data-filter="ampliacion" style="border-color:#a855f7;color:#a855f7;">🖼️ Ampliación</button>
                <button class="btn btn-filter" id="btnFilterCajaFotos" data-filter="caja_fotos" style="border-color:#f59e0b;color:#f59e0b;">📦 Caja Fotos</button>
                <button class="btn btn-filter" id="btnFilterCajaUsb" data-filter="caja_usb" style="border-color:#06b6d4;color:#06b6d4;">💾 Caja USB</button>
            </div>

            <div class="action-buttons secondary">
                <button class="btn btn-export" id="btnExport"><i class="fas fa-download"></i> Descargar Reporte</button>
                <button class="btn btn-share" id="btnShare"><i class="fas fa-copy"></i> Copiar Resumen</button>
                <button class="btn btn-clear" id="btnClear"><i class="fas fa-trash"></i> Limpiar Todo</button>
            </div>
        </div>

        <!-- Gallery Section -->
        <section class="gallery-section">
            <div class="photos-grid" id="photosGrid">
                <!-- Photos will be loaded here by JavaScript -->
            </div>
        </section>
    </div>

    <!-- Modal -->
    <div class="modal" id="photoModal">
        <!-- Botones fuera del scroll para que siempre sean visibles en iOS -->
        <button class="modal-nav-btn modal-prev" id="btnPrevPhoto">&#10094;</button>
        <button class="modal-nav-btn modal-next" id="btnNextPhoto">&#10095;</button>

        <div class="modal-content">
            <span class="modal-close">&times;</span>

            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modalImage" src="" alt="Foto seleccionada">
                    <div class="modal-photo-number" id="modalPhotoNumber" aria-live="polite"></div>
                </div>

                <div class="modal-options">
                    <h3>Clasificar esta foto</h3>
                    <p class="modal-subtitle">Selecciona las categorías para esta imagen</p>

                    <div class="option-buttons">
                        <button class="option-btn impresion" data-category="impresion">
                            <span class="option-icon">📸</span>
                            <span class="option-text">Impresión (5x7)</span>
                            <span class="option-check">✓</span>
                        </button>

                        <button class="option-btn invitacion" data-category="invitacion">
                            <span class="option-icon">💌</span>
                            <span class="option-text">Para Invitación</span>
                            <span class="option-check">✓</span>
                        </button>

                        <button class="option-btn descartada" data-category="descartada">
                            <span class="option-icon">❌</span>
                            <span class="option-text">Descartar</span>
                            <span class="option-check">✓</span>
                        </button>

                        <button class="option-btn" data-category="ampliacion" style="border-color:#a855f7;">
                            <span class="option-icon">🖼️</span>
                            <span class="option-text">Ampliación 60×80</span>
                            <span class="option-check">✓</span>
                        </button>

                        <button class="option-btn" data-category="caja_fotos" data-exclusive="true" style="border-color:#f59e0b;">
                            <span class="option-icon">📦</span>
                            <span class="option-text">Portada Caja Fotos</span>
                            <span class="option-note" style="font-size:.7rem;opacity:.7;">solo 1 foto</span>
                            <span class="option-check">✓</span>
                        </button>

                        <button class="option-btn" data-category="caja_usb" data-exclusive="true" style="border-color:#06b6d4;">
                            <span class="option-icon">💾</span>
                            <span class="option-text">Portada Caja USB</span>
                            <span class="option-note" style="font-size:.7rem;opacity:.7;">solo 1 foto</span>
                            <span class="option-check">✓</span>
                        </button>
                    </div>

                    <div class="modal-actions">
                        <button class="btn btn-cancel" id="btnCancelSelection">Cancelar</button>
                        <button class="btn btn-save" id="btnSaveSelection">Guardar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>window.EVENT_CONFIG = { telefono: '524775640349', nombre: 'Sheilyn Guadalupe', fechaEvento: new Date(2026, 3, 25, 13, 0, 0), costoFotoAdicional: 15 };</script>
    <script src="js/selector.js?v=9"></script>
    <script src="visitas.js?v=2"></script>
<script src="js/foro7-footer.js"></script>
</body>
</html>
